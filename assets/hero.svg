<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F3D2E"/>
      <stop offset="60%" stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#52B788"/>
      <animate attributeName="x2" values="0%;100%;0%" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#FFD700"/>
      <animate attributeName="x1" values="-100%;100%" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0%;200%" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="1200" height="280" fill="url(#skyGrad)"/>

  <!-- Moving clouds -->
  <g opacity="0.6">
    <ellipse cx="150" cy="50" rx="40" ry="12" fill="#FFF">
      <animate attributeName="cx" values="-50;1250" dur="20s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="400" cy="70" rx="50" ry="15" fill="#FFF">
      <animate attributeName="cx" values="-50;1250" dur="25s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="800" cy="45" rx="35" ry="10" fill="#FFF">
      <animate attributeName="cx" values="-50;1250" dur="18s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Jungle mountains -->
  <polygon points="0,200 200,100 400,200" fill="#0F3D2E" opacity="0.8"/>
  <polygon points="300,200 500,120 700,200" fill="#0F3D2E" opacity="0.7"/>
  <polygon points="700,200 900,90 1200,200" fill="#0F3D2E" opacity="0.8"/>

  <!-- Floating coins -->
  <g>
    <circle cx="100" cy="130" r="8" fill="#FFD700" filter="url(#glow)">
      <animate attributeName="cy" values="130;115;130" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="110" r="8" fill="#FFD700" filter="url(#glow)">
      <animate attributeName="cy" values="110;95;110" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="140" r="8" fill="#FFD700" filter="url(#glow)">
      <animate attributeName="cy" values="140;125;140" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Ground -->
  <rect y="200" width="1200" height="80" fill="#8B4513"/>
  <rect y="195" width="1200" height="10" fill="#2D6A4F"/>

  <!-- Mario character (pixel-art style, bouncing) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="50,0; 50,-10; 50,0" dur="0.8s" repeatCount="indefinite"/>
    <!-- Hat -->
    <rect x="595" y="155" width="20" height="6" fill="#EF4444"/>
    <rect x="590" y="161" width="30" height="4" fill="#EF4444"/>
    <!-- Face -->
    <rect x="595" y="165" width="20" height="10" fill="#FFDBAC"/>
    <rect x="593" y="170" width="4" height="3" fill="#000"/>
    <rect x="613" y="170" width="4" height="3" fill="#000"/>
    <!-- Body -->
    <rect x="590" y="175" width="30" height="15" fill="#EF4444"/>
    <rect x="595" y="180" width="20" height="10" fill="#8B5CF6"/>
    <!-- Legs -->
    <rect x="595" y="190" width="8" height="10" fill="#2D6A4F"/>
    <rect x="607" y="190" width="8" height="10" fill="#2D6A4F"/>
  </g>

  <!-- Title -->
  <text x="600" y="100" font-family="'Courier New', monospace" font-size="52" font-weight="900"
    text-anchor="middle" fill="url(#titleGrad)" filter="url(#glow)">RIMBA-MAKER</text>
  <text x="600" y="140" font-family="'Courier New', monospace" font-size="16" font-weight="700"
    text-anchor="middle" fill="#D4AF37" opacity="0.9">
    ⭐ VIBE CODER · WORLD 1-1 · FROM THE JUNGLE 🌿
    <animate attributeName="opacity" values="0.9;0.5;0.9" dur="2s" repeatCount="indefinite"/>
  </text>
</svg>