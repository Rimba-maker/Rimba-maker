<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F3D2E"/>
      <stop offset="50%" stop-color="#52B788"/>
      <stop offset="100%" stop-color="#0F3D2E"/>
    </linearGradient>
  </defs>

  <!-- Status bar -->
  <rect x="100" y="10" width="400" height="25" rx="4" fill="#0F3D2E" stroke="#D4AF37"/>
  <circle cx="120" cy="22" r="5" fill="#52B788">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <text x="300" y="28" text-anchor="middle" font-family="'Courier New', monospace"
    font-size="12" font-weight="700" fill="#FFD700">WARP PIPE NETWORK — ONLINE</text>
  <circle cx="480" cy="22" r="5" fill="#52B788">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Pipe 1: Instagram -->
  <g>
    <rect x="100" y="80" width="120" height="30" fill="url(#pipeGrad)" stroke="#0F3D2E" stroke-width="2"/>
    <rect x="110" y="110" width="100" height="80" fill="url(#pipeGrad)" stroke="#0F3D2E" stroke-width="2"/>
    <text x="160" y="155" text-anchor="middle" font-family="'Courier New', monospace"
      font-size="14" font-weight="900" fill="#FFD700">IG</text>
    <!-- Mario popping out -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,-40; 0,-40; 0,0" dur="3s" repeatCount="indefinite"/>
      <circle cx="160" cy="75" r="10" fill="#EF4444"/>
      <rect x="155" y="75" width="10" height="6" fill="#FFDBAC"/>
    </g>
    <text x="160" y="25" text-anchor="middle" font-family="'Courier New', monospace"
      font-size="9" fill="#D4AF37" opacity="0">
      @ccbmantara
      <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Pipe 2: Discord -->
  <g>
    <rect x="240" y="80" width="120" height="30" fill="url(#pipeGrad)" stroke="#0F3D2E" stroke-width="2"/>
    <rect x="250" y="110" width="100" height="80" fill="url(#pipeGrad)" stroke="#0F3D2E" stroke-width="2"/>
    <text x="300" y="155" text-anchor="middle" font-family="'Courier New', monospace"
      font-size="14" font-weight="900" fill="#FFD700">DC</text>
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,-40; 0,-40; 0,0" dur="3s" begin="1s" repeatCount="indefinite"/>
      <circle cx="300" cy="75" r="10" fill="#8B5CF6"/>
      <rect x="295" y="75" width="10" height="6" fill="#FFDBAC"/>
    </g>
  </g>

  <!-- Pipe 3: Email / rimba.dev -->
  <g>
    <rect x="380" y="80" width="120" height="30" fill="url(#pipeGrad)" stroke="#0F3D2E" stroke-width="2"/>
    <rect x="390" y="110" width="100" height="80" fill="url(#pipeGrad)" stroke="#0F3D2E" stroke-width="2"/>
    <text x="440" y="155" text-anchor="middle" font-family="'Courier New', monospace"
      font-size="12" font-weight="900" fill="#FFD700">WEB</text>
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,-40; 0,-40; 0,0" dur="3s" begin="2s" repeatCount="indefinite"/>
      <circle cx="440" cy="75" r="10" fill="#D4AF37"/>
      <rect x="435" y="75" width="10" height="6" fill="#FFDBAC"/>
    </g>
  </g>
</svg>