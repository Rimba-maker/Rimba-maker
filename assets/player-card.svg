<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F3D2E"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="hpBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <linearGradient id="xpBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect width="800" height="340" rx="12" fill="url(#cardBg)" stroke="#D4AF37" stroke-width="2"/>

  <!-- Scanline effect -->
  <g opacity="0.08">
    <rect y="0" width="800" height="2" fill="#D4AF37"/>
    <rect y="20" width="800" height="2" fill="#D4AF37"/>
    <rect y="40" width="800" height="2" fill="#D4AF37"/>
  </g>

  <!-- Title -->
  <text x="30" y="45" font-family="'Courier New', monospace" font-size="20" font-weight="900" fill="#FFD700">
    🏰 PLAYER CARD — WORLD 1-1
  </text>
  <line x1="30" y1="58" x2="770" y2="58" stroke="#D4AF37" stroke-width="1" opacity="0.5"/>

  <!-- Player info -->
  <g font-family="'Courier New', monospace" font-size="14" fill="#FFFFFF">
    <text x="30" y="90">🔴 PLAYER     : Gat</text>
    <text x="30" y="115">⭐ CLASS     : Solo Full-Stack Developer</text>
    <text x="30" y="140">🍄 POWER-UP  : Next.js + Supabase + TypeScript</text>
    <text x="30" y="165">📍 LOCATION  : Indonesia 🇮🇩</text>
    <text x="30" y="190">🏁 MISSION   : Build products. Ship relentlessly.</text>
  </g>

  <!-- HP Bar -->
  <text x="30" y="225" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#EF4444">
    LIVES ❤️
  </text>
  <rect x="120" y="213" width="300" height="16" rx="3" fill="#1a0a2e" stroke="#EF4444"/>
  <rect x="122" y="215" width="0" height="12" rx="2" fill="url(#hpBar)">
    <animate attributeName="width" values="0;296;296" dur="2s" fill="freeze"/>
  </rect>
  <text x="430" y="225" font-family="'Courier New', monospace" font-size="12" fill="#FFD700">
    ∞ / ∞ (coffee-powered)
  </text>

  <!-- Coins -->
  <text x="30" y="255" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#FFD700">
    COINS 🪙
  </text>
  <g transform="translate(120, 244)">
    <circle cx="10" cy="10" r="7" fill="#FFD700">
      <animate attributeName="r" values="7;5;7" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="10" r="7" fill="#FFD700">
      <animate attributeName="r" values="7;5;7" dur="1s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="10" r="7" fill="#FFD700">
      <animate attributeName="r" values="7;5;7" dur="1s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="10" r="7" fill="#FFD700">
      <animate attributeName="r" values="7;5;7" dur="1s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="10" r="7" fill="#FFD700">
      <animate attributeName="r" values="7;5;7" dur="1s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Quest progress -->
  <text x="30" y="290" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#D4AF37">
    🎯 MARRYIO    : Wedding invitation SaaS (Indonesia)
  </text>
  <rect x="30" y="298" width="740" height="10" rx="2" fill="#1a0a2e" stroke="#8B5CF6"/>
  <rect x="32" y="300" width="0" height="6" rx="1" fill="url(#xpBar)">
    <animate attributeName="width" values="0;629" dur="2.5s" fill="freeze"/>
  </rect>
  <text x="770" y="308" text-anchor="end" font-family="'Courier New', monospace" font-size="11" fill="#FFFFFF">
    85% — production
  </text>

  <text x="30" y="325" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#52B788">
    🌿 RIMBA.DEV  : Personal portfolio + remote job hunt
  </text>
  <rect x="30" y="333" width="740" height="4" rx="1" fill="#1a0a2e" stroke="#52B788"/>
</svg>
